<script>
// ============ 閰嶇疆 ============
const SUPABASE_URL = 'https://ppsmljichazzznbaaaxx.supabase.co';

  if (session) { currentUser = session.user; await checkSubscription(); }
  else { showLanding(); }

  supabase.auth.onAuthStateChange(async (event, session) => {
    if (session) { currentUser = session.user; await checkSubscription(); }
    else { currentUser = null; showLanding(); }
  });

  const params = new URLSearchParams(window.location.search);

}

// ============ 椤甸潰鍒囨崲 ============
function hideAll() {
  document.getElementById('landingPage').style.display = 'none';
  document.getElementById('authSection').classList.remove('active');
  document.getElementById('pricingSection').classList.remove('active');
  document.getElementById('dashboardSection').classList.remove('active');
  document.getElementById('userSection').classList.remove('active');
}

function showLanding() {
  hideAll();
  document.getElementById('landingPage').style.display = 'block';
  document.getElementById('navActions').innerHTML = '<button class="btn btn-primary btn-sm" onclick="showAuth()">鐧诲綍</button>';
}

function showAuth() {
  hideAll();
  document.getElementById('authSection').classList.add('active');
  resetAuthForm();
}

function showPricing() {
  hideAll();
  document.getElementById('pricingSection').classList.add('active');
}

  hideAll();
  document.getElementById('dashboardSection').classList.add('active');
  document.getElementById('dashboardFrame').src = DASHBOARD_URL;
}

  hideAll();

  loadUserInfo();
}

function scrollToPricing() { document.getElementById('pricingAnchor').scrollIntoView({ behavior: 'smooth' }); }

async function checkSubscription() {
  if (!currentUser) return showLanding();
  const { data } = await supabase.from('subscriptions').select('*').eq('user_id', currentUser.id).maybeSingle();
  if (data && data.expires_at && new Date(data.expires_at) > new Date()) {
    updateNavForUser();
    showDashboard();
  } else {
    updateNavForUser();
    showPricing();
  }
}

function updateNavForUser() {
  if (!currentUser) return;
  const initial = currentUser.email.charAt(0).toUpperCase();
  document.getElementById('navActions').innerHTML = `

  `;
}

// ============ 璁よ瘉 ============
function resetAuthForm() {
  document.getElementById('authEmail').value = '';
  document.getElementById('authPassword').value = '';
  document.getElementById('authError').style.display = 'none';
  isRegisterMode = false; updateAuthUI();
}
function toggleAuthMode() {
  isRegisterMode = !isRegisterMode;
  document.getElementById('authEmail').value = '';
  document.getElementById('authPassword').value = '';
  document.getElementById('authError').style.display = 'none';
  updateAuthUI();
}
function updateAuthUI() {
  if (isRegisterMode) {
    document.getElementById('authTitle').textContent = '娉ㄥ唽';
    document.getElementById('authSubtitle').textContent = '娉ㄥ唽鍚庡嵆鍙闃匬ro鏂规';
    document.getElementById('authBtn').textContent = '娉ㄥ唽';

    document.getElementById('switchLink').textContent = '鍘荤櫥褰?;
  } else {
    document.getElementById('authTitle').textContent = '鐧诲綍';
    document.getElementById('authSubtitle').textContent = '鐧诲綍鍚庤В閿佸叏閮ㄤ笓涓氬垎鏋愭寚鏍?;
    document.getElementById('authBtn').textContent = '鐧诲綍';

    document.getElementById('switchLink').textContent = '鍘绘敞鍐?;
  }
}

async function handleAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errorEl = document.getElementById('authError');
  if (!email || !password) { errorEl.textContent = '璇峰～鍐欓偖绠卞拰瀵嗙爜'; errorEl.style.display = 'block'; return; }
  if (password.length < 6) { errorEl.textContent = '瀵嗙爜鑷冲皯6浣?; errorEl.style.display = 'block'; return; }
  errorEl.style.display = 'none';

  let result;
  if (isRegisterMode) { result = await supabase.auth.signUp({ email, password }); }
  else { result = await supabase.auth.signInWithPassword({ email, password }); }

  if (result.error) { errorEl.textContent = result.error.message; errorEl.style.display = 'block'; return; }

  if (isRegisterMode && result.data.user) {
    const referrer = localStorage.getItem('referrer');
    if (referrer) {
      await supabase.from('referrals').insert({ referrer_id: referrer, referred_id: result.data.user.id });
    }
    await supabase.from('subscriptions').insert({ user_id: result.data.user.id, plan: 'free', expires_at: new Date().toISOString() });
  }
  currentUser = result.data.user;
  await checkSubscription();
}

async function handleLogout() {
  await supabase.auth.signOut();
  currentUser = null;
  showLanding();
}

  document.getElementById('payButtons').style.display = 'block';
  document.getElementById('payRetryBtns').style.display = 'none';
  document.getElementById('payCreateBtn').style.display = 'block';
  document.getElementById('manualQueryBtn').style.display = 'none';

  document.getElementById('payModal').classList.add('active');
}

function closePayModal() {
  document.getElementById('payModal').classList.remove('active');
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function selectPayPlan(plan, amount) {
  selectedPlan = plan; selectedAmount = amount;
  document.getElementById('planTrial').classList.toggle('selected', plan === 'trial');
  document.getElementById('planMonthly').classList.toggle('selected', plan === 'monthly');
  document.getElementById('payTitle').textContent = plan === 'trial' ? '7澶╀綋楠? : '鏈堝崱璁㈤槄';
  document.getElementById('payAmount').textContent = `鏀粯閲戦锛毬?{amount}`;
}

function switchPayMethod(method) {
  payMethod = method;
  document.getElementById('payWx').classList.toggle('selected', method === 1);
  document.getElementById('payAli').classList.toggle('selected', method === 2);
}

function setStep(step) {
  const s1 = document.getElementById('step1'), s2 = document.getElementById('step2');
  const line = document.getElementById('stepLine');
  if (step === 1) {
    s1.className = 'step active'; s2.className = 'step'; line.className = 'step-line';
  } else {
    s1.className = 'step completed'; s2.className = 'step active'; line.className = 'step-line done';
  }
}

async function createOrder() {
  setStep(2);
  document.getElementById('payPlanConfirm').style.display = 'none';
  document.getElementById('payButtons').style.display = 'none';
  document.getElementById('payCreateBtn').style.display = 'none';
  document.getElementById('qrWrapper').innerHTML = '<div class="spinner"></div>';
  document.getElementById('payStatus').textContent = '姝ｅ湪鍒涘缓鏀粯璁㈠崟...';
  document.getElementById('payStatus').className = 'pay-status';
  document.getElementById('payRetryBtns').style.display = 'none';

  try {
    const resp = await fetch('/api/pay', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: currentUser.id, pay_type: payMethod, money: selectedAmount })
    });
    const data = await resp.json();

    if (data.error) {
      document.getElementById('qrWrapper').innerHTML = `<p style="color:var(--danger);font-size:14px;">${data.error}</p>`;
      document.getElementById('payStatus').textContent = data.xdd_msg || '璁㈠崟鍒涘缓澶辫触';
      document.getElementById('payStatus').className = 'pay-status';
      document.getElementById('payRetryBtns').style.display = 'flex';
      document.getElementById('manualQueryBtn').style.display = 'none';
      return;
    }

    currentOrderNo = data.order_no;
    const qrSrc = data.qr_img ? `data:image/png;base64,${data.qr_img}` : data.qr;
    document.getElementById('qrWrapper').innerHTML = `
      <div class="qr-area">
        <img src="${qrSrc}" alt="鏀粯浜岀淮鐮? onerror="this.parentElement.innerHTML='<p style=color:var(--danger);>浜岀淮鐮佸姞杞藉け璐ワ紝璇烽噸璇?/p>';document.getElementById('payRetryBtns').style.display='flex';">
        <div class="qr-price"><span class="yen-sign">楼</span>${data.money || selectedAmount}</div>
      </div>`;
    document.getElementById('payStatus').textContent = '璇蜂娇鐢ㄥ搴擜pp鎵爜鏀粯';
    document.getElementById('payStatus').className = 'pay-status';
    document.getElementById('payRetryBtns').style.display = 'flex';

    // 3绉掑悗鏄剧ず鎵嬪姩鏌ュ崟鎸夐挳
    setTimeout(() => { document.getElementById('manualQueryBtn').style.display = 'inline-flex'; }, 3000);

    // 寮€濮嬭疆璇?    startPolling();
  } catch (e) {
    document.getElementById('qrWrapper').innerHTML = `<p style="color:var(--danger);font-size:14px;">缃戠粶閿欒锛?{e.message}</p>`;
    document.getElementById('payStatus').textContent = '';
    document.getElementById('payRetryBtns').style.display = 'flex';
    document.getElementById('manualQueryBtn').style.display = 'none';
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollRetries = 0;
  pollTimer = setInterval(async () => {
    pollRetries++;
    if (pollRetries > POLL_MAX) {
      clearInterval(pollTimer); pollTimer = null;
      document.getElementById('payStatus').textContent = '鏀粯纭瓒呮椂锛岃鐐瑰嚮涓嬫柟鎸夐挳鎵嬪姩鏌ヨ';
      document.getElementById('payStatus').className = 'pay-status';
      document.getElementById('manualQueryBtn').style.display = 'inline-flex';
      return;
    }
    try {
      const resp = await fetch(`/api/notify?check=${currentOrderNo}&user_id=${currentUser.id}`);
      const data = await resp.json();
      if (data.paid) {
        clearInterval(pollTimer); pollTimer = null;
        onPaymentSuccess();
      }
    } catch (e) { /* ignore */ }
  }, POLL_INTERVAL);
}

async function manualCheckOrder() {
  document.getElementById('payStatus').textContent = '姝ｅ湪鏌ヨ鏀粯鐘舵€?..';
  try {
    const resp = await fetch(`/api/notify?check=${currentOrderNo}&user_id=${currentUser.id}`);
    const data = await resp.json();
    if (data.paid) {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      onPaymentSuccess();
    } else {
      document.getElementById('payStatus').textContent = '鏆傛湭妫€娴嬪埌鏀粯璁板綍锛岃纭宸插畬鎴愭敮浠樺悗鍐嶈瘯';
      document.getElementById('payStatus').className = 'pay-status';
    }
  } catch (e) {
    document.getElementById('payStatus').textContent = '鏌ヨ澶辫触锛岃閲嶈瘯';
  }
}

function onPaymentSuccess() {
  document.getElementById('qrWrapper').innerHTML = '<div class="success-check">鉁?/div>';
  document.getElementById('payStatus').textContent = '鏀粯鎴愬姛锛佹鍦ㄨ烦杞?..';
  document.getElementById('payStatus').className = 'pay-status success';
  document.getElementById('payRetryBtns').style.display = 'none';
  setTimeout(async () => {
    closePayModal();
    await checkSubscription();
  }, 1500);
}

// ============ 鐢ㄦ埛涓績 ============
async function loadUserInfo() {
  if (!currentUser) return;
  const { data: sub } = await supabase.from('subscriptions').select('*').eq('user_id', currentUser.id).maybeSingle();
  document.getElementById('infoPlan').textContent = sub ? sub.plan : '鍏嶈垂';
  if (sub && sub.expires_at) {
    document.getElementById('infoExpiry').textContent = new Date(sub.expires_at).toLocaleDateString('zh-CN');
  } else { document.getElementById('infoExpiry').textContent = '--'; }

  const { data: commissions } = await supabase.from('commissions').select('amount').eq('referrer_id', currentUser.id);
  const total = commissions ? commissions.reduce((s, c) => s + c.amount, 0) : 0;
  document.getElementById('infoCommission').textContent = '楼' + total.toFixed(2);
  document.getElementById('infoInvites').textContent = (commissions ? commissions.length : 0) + '浜?;
  document.getElementById('refLinkText').textContent = `${window.location.origin}/?ref=${currentUser.id}`;
}

async function copyRefLink() {
  const refLink = `${window.location.origin}/?ref=${currentUser.id}`;
  try { await navigator.clipboard.writeText(refLink); showToast('鎺ㄥ箍閾炬帴宸插鍒?); }
  catch { showToast('澶嶅埗澶辫触锛岃鎵嬪姩澶嶅埗'); }
}

// ============ Toast ============
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  t.className = 'toast' + (type === 'error' ? ' error' : '');
  setTimeout(() => { t.style.display = 'none'; }, 2500);
}

init();
</script>
